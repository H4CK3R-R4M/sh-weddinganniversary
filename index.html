<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urgent Alert!</title>
    <style>
        body { background-color: #000; color: #fff; font-family: Arial, sans-serif; text-align: center; padding: 40px 20px; margin: 0; }
        .container { max-width: 500px; margin: auto; }
        h1 { color: #ff3333; font-size: 28px; }
        p { font-size: 18px; margin-bottom: 30px; }
        .btn { background: #ff3333; color: white; padding: 15px 30px; font-size: 20px; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; display: inline-block; }
        #prank-zone { display: none; margin-top: 20px; }
        iframe { width: 100%; max-width: 560px; height: 315px; border: none; }
    </style>
</head>
<body>
    <div class="container">
        <div id="setup-zone">
            <h1>⚠️ SECURITY BREACH DETECTED</h1>
            <p>Your device's camera has been accessed by an unauthorized third party. Click below to view the active stream and secure your connection.</p>
            <button class="btn" onclick="revealPrank()">VIEW LIVE STREAM</button>
        </div>

        <div id="prank-zone">
            <h1>🎉 GOTCHA! 🎉</h1>
            <p>Relax, it's just a prank!</p>
            <!-- Replace this URL with any YouTube video link you want -->
            <iframe id="video" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        function revealPrank() {
            document.getElementById('setup-zone').style.display = 'none';
            document.getElementById('prank-zone').style.display = 'block';
            // Edits the video source to autoplay your prank video
            // Tip: Replace the ID below (dQw4w9WgXcQ) with your chosen YouTube video ID
            document.getElementById('video').src = "https://youtube.com";
        }
    </script>
</body>
</html>
